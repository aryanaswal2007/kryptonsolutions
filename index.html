// ── ATOMS ──────────────────────────────────────────────────────────────────
function Ic({n,s=16,col}){return <i className={"ti ti-"+n} style={{fontSize:s,lineHeight:1,color:col||"inherit"}}/>;}
function PIAvatar({name,size=34,gold}){
  return <div style={{width:size,height:size,borderRadius:size*.28,background:gold?"linear-gradient(135deg,#FDF3D0,#E8C96A)":"linear-gradient(135deg,#EEF0FF,#D8DCFF)",border:`1.5px solid ${gold?"#C9A84C":"#B0B8E8"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.32,fontWeight:800,color:gold?"#B8860B":"#6050A8",flexShrink:0}}>{INI(name)}</div>;
}
function Badge({label,c,bg,bd,dot,sm}){
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:sm?"2px 8px":"3px 10px",borderRadius:20,background:bg||C.goldBg,color:c||C.gold,border:`1px solid ${bd||C.goldBd}`,fontSize:sm?9:10,fontWeight:700,whiteSpace:"nowrap"}}>{dot&&<span style={{width:5,height:5,borderRadius:"50%",background:c||C.gold,flexShrink:0,display:"inline-block"}}/>}{label}</span>;
}
function SLABar({createdAt,sla,status}){
  const lim=sla==="gold"?240:480,el=ELAPSED(createdAt),done=status==="Gelöst"||status==="Geschlossen";
  if(done)return <Badge label="✓ Abgeschlossen" c={C.green} bg={C.greenBg} bd={C.greenBd} sm/>;
  const pct=Math.min((el/lim)*100,100),over=el>lim,seg=over?C.red:pct>75?C.amber:C.green;
  return <div style={{minWidth:100}}><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:over?C.red:C.txtMute,marginBottom:3,fontWeight:700}}><span>{el}m</span><span style={{color:over?C.red:sla==="gold"?C.gold:C.txtMid}}>{over?"⚠ Verletzt":sla==="gold"?"Gold ≤4h":"Silber ≤8h"}</span></div><div style={{height:3,background:C.border,borderRadius:2}}><div style={{width:pct+"%",height:"100%",background:seg,borderRadius:2}}/></div></div>;
}

// ── AI CHAT ────────────────────────────────────────────────────────────────
function AIChat({onClose,customer}){
  const [msgs,setMsgs]=useState([{role:"bot",text:`Hallo${customer?" "+customer.contact.split(" ")[0]:""}! Ich bin der KI-Assistent von Krypton Solutions.\n\nWie kann ich Ihnen helfen? Zum Beispiel:\n• Passwort zurücksetzen\n• VPN-Probleme lösen\n• Drucker einrichten\n• Ticket erstellen`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs,loading]);

  const getAIReply=(q)=>{
    const t=q.toLowerCase();
    if(/outlook|mail|e-mail|email/.test(t)) return "Outlook-Probleme können verschiedene Ursachen haben.\n\nBitte prüfen Sie folgendes:\n1. Internetverbindung aktiv?\n2. Outlook neu starten (Task-Manager → Outlook beenden)\n3. Windows-Anmeldedaten prüfen (Systemsteuerung → Anmeldeinformationen)\n4. Outlook im abgesicherten Modus starten: Win+R → outlook.exe /safe\n\nWenn das Problem weiterhin besteht, erstellen Sie bitte ein Ticket – wir melden uns innerhalb Ihrer SLA-Zeit.";
    if(/passwort|kennwort|password|gesperrt|locked|konto|account/.test(t)) return "Für einen Passwort-Reset benötigen wir folgende Informationen:\n\n1. Ihr vollständiger Benutzername (z.B. m.muster)\n2. Ihre Firma / Abteilung\n3. Kontakt-Telefonnummer zur Verifikation\n\nBitte erstellen Sie ein Ticket mit der Kategorie 'Active Directory' und Priorität 'Mittel'. Unser 1st-Level-Team führt den Reset umgehend durch.";
    if(/vpn|verbindung|netzwerk|network/.test(t)) return "VPN-Verbindungsprobleme – Schnellhilfe:\n\n1. VPN-Client neu starten\n2. Internetverbindung prüfen (ohne VPN erreichbar?)\n3. VPN-Client deinstallieren und neu installieren\n4. Windows-Firewall temporär deaktivieren (Test)\n5. DNS-Cache leeren: cmd → ipconfig /flushdns\n\nWelchen VPN-Client verwenden Sie? Erstellen Sie ein Ticket mit Details, unser Netzwerk-Team hilft Ihnen weiter.";
    if(/drucker|printer|drucken|druckauftrag|offline/.test(t)) return "Drucker offline – Schritt-für-Schritt:\n\n1. Drucker aus- und einschalten (30 Sek. warten)\n2. USB/Netzwerkkabel prüfen\n3. Windows: Start → Drucker & Scanner → Drucker auswählen → 'Als Standard festlegen'\n4. Druckerwarteschlange leeren: services.msc → Print Spooler neu starten\n5. Treiber neu installieren (Hersteller-Website)\n\nBei Netzwerkdruckern: IP-Adresse des Druckers prüfen (Konfigurationsseite drucken).";
    if(/teams|microsoft|office|word|excel|powerpoint|software/.test(t)) return "Microsoft 365 / Teams Probleme:\n\n1. Anwendung vollständig schliessen (Task-Manager)\n2. Cache leeren:\n   Teams: %appdata%\\Microsoft\\Teams → Alle Inhalte löschen\n   Office: Datei → Optionen → Trust Center → Cache löschen\n3. Als Administrator ausführen (rechter Mausklick)\n4. Reparatur: Systemsteuerung → Apps → Microsoft 365 → Ändern → Reparieren\n5. Updates prüfen: Datei → Office-Konto → Updates\n\nBrauchen Sie weitere Hilfe? Ticket erstellen!";
    if(/ticket|erstell|meld|problem|hilfe|support/.test(t)) return "Gerne helfe ich Ihnen ein Ticket zu erstellen!\n\nKlicken Sie oben auf 'Meine Tickets' → 'Neues Ticket erstellen'.\n\nFüllen Sie folgende Felder aus:\n• Betreff: Kurze Beschreibung\n• Kategorie: Passendes Thema wählen\n• Priorität: Kritisch / Hoch / Mittel / Niedrig\n• Beschreibung: Detaillierte Fehlerbeschreibung\n\nIhr SLA garantiert Ihnen eine Reaktion innerhalb der vereinbarten Zeit. Gold-Kunden erhalten Priorität.";

  const save=form=>{if(sel){setTickets(ts=>ts.map(t=>t.id===sel.id?{...t,...form}:t));}else{const id="T-"+String(_tc++).padStart(4,"0");setTickets(ts=>[{id,...form,status:"Offen",createdAt:NOW(),creatorName:user.name,source:"helpdesk"},...ts]);}setModal(false);setSel(null);};
  const update=(id,status,aId)=>{setTickets(ts=>ts.map(t=>t.id===id?{...t,status,assigneeId:aId}:t));setSel(null);};
  const Chip=({label,v,cur,onChange})=><button onClick={()=>onChange(v)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${cur===v?C.gold:C.border}`,background:cur===v?C.goldBg:"transparent",color:cur===v?C.gold:C.txtMute,fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>;
  return <div style={{flex:1,overflowY:"auto",padding:20,background:C.bg}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><h2 style={{fontSize:17,fontWeight:800,color:C.brownD}}>{isAdmin?"Alle Tickets":"Meine Tickets"}</h2><p style={{fontSize:11,color:C.txtMute,marginTop:2}}>{filtered.length} Tickets{isAdmin?` · ${tickets.filter(t=>t.source==="portal").length} via Portal`:""}</p></div>
      <button onClick={()=>{setSel(null);setModal(true);}} className="btn btn-gold btn-sm"><Ic n="plus" s={13} col="#fff"/>Neues Ticket</button>
    </div>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 13px",marginBottom:12,display:"flex",flexWrap:"wrap",gap:7,alignItems:"center"}}>
      <div style={{position:"relative",flex:"1 1 160px"}}><span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic n="search" s={12} col={C.txtMute}/></span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Ticket suchen…" style={{width:"100%",padding:"7px 9px 7px 28px",borderRadius:7,border:`1px solid ${C.border}`,fontSize:11,color:C.txt,background:C.bg,outline:"none",boxSizing:"border-box"}}/></div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}><Chip label="Alle" v="Alle" cur={fSt} onChange={setFSt}/>{STATS.map(s=><Chip key={s} label={s} v={s} cur={fSt} onChange={setFSt}/>)}</div>
      <div style={{display:"flex",gap:3}}>{[["Alle","Alle"],["gold","★ Gold"],["silver","● Silber"]].map(([v,l])=><Chip key={v} label={l} v={v} cur={fSla} onChange={setFSla}/>)}</div>
      {isAdmin&&<div style={{display:"flex",gap:3}}>{[["Alle","Alle Quellen"],["portal","📬 Portal"],["helpdesk","🖥 Helpdesk"]].map(([v,l])=><Chip key={v} label={l} v={v} cur={fSrc} onChange={setFSrc}/>)}</div>}
    </div>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:11,overflow:"hidden"}}>
      <table className="data-table"><thead><tr>{["ID","Betreff","Kunde","SLA","Priorität","Level","Zuständig","Status","SLA-Zeit"].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{filtered.length===0?<tr><td colSpan={9} style={{padding:"44px",textAlign:"center",color:C.txtMute,fontSize:13}}>Keine Tickets gefunden</td></tr>:filtered.map(t=>{const a=STAFF.find(u=>u.id===t.assigneeId),pc=PC[t.priority]||PC.Niedrig,sc=SC[t.status]||SC["Offen"];return<tr key={t.id} onClick={()=>setSel(t)}><td style={{fontFamily:"monospace",fontSize:9,fontWeight:700,color:C.gold}}>{t.id}{t.source==="portal"&&<span style={{marginLeft:4,fontSize:7,background:C.goldBg,color:C.gold,padding:"1px 4px",borderRadius:8,border:`1px solid ${C.goldBd}`}}>📬</span>}</td><td style={{fontWeight:600,fontSize:12,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</td><td style={{fontSize:11,color:C.txtMid,maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.customer}</td><td><Badge label={t.sla==="gold"?"★ Gold":"● Silber"} c={t.sla==="gold"?C.gold:C.txtMid} bg={C.goldBg} bd={C.goldBd} sm/></td><td><Badge label={t.priority} c={pc.c} bg={pc.bg} bd={pc.bd} sm dot/></td><td style={{fontSize:10,color:C.txtMid,whiteSpace:"nowrap"}}>{t.level}</td><td>{a?<div style={{display:"flex",alignItems:"center",gap:5}}><PIAvatar name={a.name} size={19} gold/><span style={{fontSize:10,color:C.txtMid}}>{a.name.split(",")[0]}</span></div>:<span style={{fontSize:10,color:C.txtMute}}>–</span>}</td><td><Badge label={t.status} c={sc.c} bg={sc.bg} bd={sc.bd} sm/></td><td style={{minWidth:100}}><SLABar createdAt={t.createdAt} sla={t.sla} status={t.status}/></td></tr>;})}
      </tbody></table>
    </div>
    {modal&&<TicketModal onClose={()=>setModal(false)} onSave={save} currentUser={user}/>}
    {sel&&!modal&&<TicketDetail t={sel} onClose={()=>setSel(null)} onUpdate={update} isAdmin={isAdmin}/>}
  </div>;
}

function HDSLAPage(){
  const p=[{p:"P1 Kritisch",col:C.red,s:"4 Std.",g:"1 Std."},{p:"P2 Hoch",col:C.amber,s:"8 Std.",g:"4 Std."},{p:"P3 Mittel",col:C.gold,s:"1 AT",g:"8 Std."},{p:"P4 Niedrig",col:C.txtMute,s:"3 AT",g:"1 AT"}];
  return <div style={{flex:1,overflowY:"auto",padding:20,background:C.bg}}>
    <h2 style={{fontSize:17,fontWeight:800,color:C.brownD,marginBottom:16}}>SLA-Modelle</h2>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
      {[{sym:"●",l:"Silber",c:C.txtMid,bg:"#F5F0E8",bd:C.border,t:"Mo–Fr 08:00–17:00",r:"≤ 1 Arbeitstag"},{sym:"★",l:"Gold",c:C.gold,bg:C.goldBg,bd:C.goldBd,t:"24/7",r:"≤ 4 Stunden"}].map(pl=><div key={pl.l} style={{background:C.panel,border:`2px solid ${pl.bd}`,borderRadius:11,overflow:"hidden"}}><div style={{background:pl.bg,padding:"12px 16px",borderBottom:`1px solid ${pl.bd}`,display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:20,color:pl.c}}>{pl.sym}</span><div style={{fontSize:14,fontWeight:800,color:pl.c}}>{pl.l}</div></div><div style={{padding:"11px 16px"}}>{[["Zeiten",pl.t],["Reaktion",pl.r]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}><span style={{color:C.txtMute}}>{k}</span><span style={{color:pl.c,fontWeight:600}}>{v}</span></div>)}</div></div>)}
    </div>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:11,overflow:"hidden"}}><table className="data-table"><thead><tr>{["Priorität","Silber","Gold"].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{p.map(r=><tr key={r.p}><td><span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:7,height:7,borderRadius:"50%",background:r.col,display:"inline-block"}}/><strong style={{fontSize:12,color:C.brownD}}>{r.p}</strong></span></td><td style={{fontSize:12}}>{r.s}</td><td style={{fontSize:12,fontWeight:700,color:C.gold}}>{r.g}</td></tr>)}</tbody></table></div>
  </div>;
}

function HDOrgPage(){
  const mgmt=[{name:"Calisto, Marcello",title:"CBO"},{name:"Matos, Fabio",title:"CIO"},{name:"Hachem, Ghaith",title:"CIO"},{name:"Aswal, Aryan",title:"CIO"}];
  const lvls=[{l:"1st Level",col:C.green,m:["Müller, Thomas","Weber, Sandra","Fischer, Klaus"],rot:"Wöchentlich"},{l:"2nd Level",col:C.gold,m:["Meier, Petra","Huber, Stefan"],rot:"Alle 2 Wochen"},{l:"3rd Level",col:C.violet,m:["Brunner, Lisa","Wagner, Reto"],rot:"Alle 4 Wochen"},{l:"Onsite",col:C.amber,m:["Wagner, Reto"],rot:"Alle 4 Wochen"}];
  return <div style={{flex:1,overflowY:"auto",padding:20,background:C.bg}}>
    <h2 style={{fontSize:17,fontWeight:800,color:C.brownD,marginBottom:16}}>Organigramm</h2>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px",marginBottom:11}}><div style={{fontSize:9,fontWeight:700,color:C.gold,letterSpacing:".09em",marginBottom:10,textTransform:"uppercase"}}>Geschäftsleitung (nicht im Support)</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>{mgmt.map(m=><div key={m.name} style={{background:C.card,border:`1px solid ${C.goldBd}`,borderRadius:9,padding:"12px",textAlign:"center"}}><PIAvatar name={m.name} size={40} gold/><div style={{fontSize:11,fontWeight:700,color:C.brownD,marginTop:8}}>{m.name.split(",")[0]}</div><div style={{fontSize:9,color:C.gold,fontWeight:700,marginTop:2}}>{m.title}</div></div>)}</div></div>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px",marginBottom:11}}><div style={{fontSize:9,fontWeight:700,color:C.txtMute,letterSpacing:".09em",marginBottom:10,textTransform:"uppercase"}}>Support-Ebenen</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>{lvls.map(l=><div key={l.l} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${l.col}`,borderRadius:9,padding:"10px"}}><div style={{fontSize:12,fontWeight:800,color:l.col,marginBottom:5}}>{l.l}</div>{l.m.map(m=><div key={m} style={{fontSize:9,color:C.txtMid,display:"flex",alignItems:"center",gap:4,marginBottom:2}}><span style={{width:4,height:4,borderRadius:"50%",background:l.col+"70",flexShrink:0,display:"inline-block"}}/>{m.split(",")[0]}</div>)}<div style={{fontSize:8,color:C.txtMute,marginTop:5}}>↻ {l.rot}</div></div>)}</div></div>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px"}}><div style={{fontSize:9,fontWeight:700,color:C.txtMute,letterSpacing:".09em",marginBottom:9,textTransform:"uppercase"}}>Eskalationsweg</div><div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>{[["SPOC",C.gold],["1st Level",C.green],["2nd Level",C.gold],["3rd Level",C.violet],["Hersteller",C.red]].map(([l,c],i)=><span key={l} style={{display:"flex",alignItems:"center",gap:5}}>{i>0&&<span style={{color:C.border,fontSize:15,fontWeight:700}}>›</span>}<span style={{background:c+"14",border:`1px solid ${c}45`,borderRadius:6,padding:"5px 11px",fontSize:10,color:c,fontWeight:700}}>{l}</span></span>)}</div></div>
  </div>;
}

function HDUsersPage(){
  const groups=[{title:"Admin",col:C.red,list:STAFF.filter(u=>u.name==="Admin")},{title:"Geschäftsleitung",col:C.gold,list:STAFF.filter(u=>u.level==="Management"&&u.name!=="Admin")},{title:"1st Level",col:C.green,list:STAFF.filter(u=>u.level==="1st Level")},{title:"2nd Level",col:C.amber,list:STAFF.filter(u=>u.level==="2nd Level")},{title:"3rd Level",col:C.violet,list:STAFF.filter(u=>u.level==="3rd Level")}].filter(g=>g.list.length>0);
  return <div style={{flex:1,overflowY:"auto",padding:20,background:C.bg}}>
    <h2 style={{fontSize:17,fontWeight:800,color:C.brownD,marginBottom:16}}>Benutzerverwaltung</h2>
    {groups.map(g=><div key={g.title} style={{marginBottom:12}}><div style={{fontSize:9,fontWeight:700,color:g.col,letterSpacing:".09em",marginBottom:5,textTransform:"uppercase",display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:g.col,display:"inline-block"}}/>{g.title} ({g.list.length})</div><div style={{background:C.panel,border:`1px solid ${C.border}`,borderLeft:`3px solid ${g.col}`,borderRadius:9,overflow:"hidden"}}><table className="data-table"><thead><tr>{["Name","Funktion","Abteilung","E-Mail","Rolle"].map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{g.list.map((u,i)=><tr key={u.id} style={{cursor:"default"}}><td><div style={{display:"flex",alignItems:"center",gap:8}}><PIAvatar name={u.name} size={26} gold/><span style={{fontSize:12,fontWeight:600,color:C.brownD}}>{u.name}</span></div></td><td style={{fontSize:11,color:C.txtMid}}>{u.title}</td><td style={{fontSize:10,color:C.txtMute}}>{u.dept}</td><td style={{fontSize:9,color:C.txtMute,fontFamily:"monospace"}}>{u.email}</td><td><Badge label={u.role} c={u.role==="Admin"?C.gold:C.green} bg={u.role==="Admin"?C.goldBg:C.greenBg} bd={u.role==="Admin"?C.goldBd:C.greenBd} sm/></td></tr>)}</tbody></table></div></div>)}
  </div>;
}

// ── ROOT ───────────────────────────────────────────────────────────────────
function App(){
  const [mode,setMode]=useState("website");
  const [webPage,setWebPage]=useState("Home");
  const [showSL,setShowSL]=useState(false);
  const [showCL,setShowCL]=useState(false);
  const [staffUser,setStaffUser]=useState(null);
  const [customer,setCustomer]=useState(null);
  const [hdPage,setHdPage]=useState("dashboard");
  const [tickets,setTickets]=useState(SEED);
  const [showChat,setShowChat]=useState(false);

  const doSL=u=>{setStaffUser(u);setShowSL(false);setHdPage("dashboard");setMode("helpdesk");};
  const doCL=c=>{setCustomer(c);setShowCL(false);setMode("portal");};
  const doLogout=()=>{setStaffUser(null);setCustomer(null);setMode("website");};

  if(mode==="helpdesk"&&staffUser){
    return <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <HDBar page={hdPage} setPage={setHdPage} user={staffUser} onLogout={doLogout}/>
      <div style={{flex:1,overflow:"hidden",display:"flex"}}>
        {hdPage==="dashboard"&&<HDDashboard tickets={tickets} user={staffUser} setPage={setHdPage}/>}
        {hdPage==="tickets"  &&<HDTickets   tickets={tickets} setTickets={setTickets} user={staffUser}/>}
        {hdPage==="sla"      &&<HDSLAPage/>}
        {hdPage==="org"      &&staffUser.role==="Admin"&&<HDOrgPage/>}
        {hdPage==="users"    &&staffUser.role==="Admin"&&<HDUsersPage/>}
      </div>
    </div>;
  }

  if(mode==="portal"&&customer){
    return <>
      <CustomerPortal customer={customer} tickets={tickets} setTickets={setTickets} onLogout={doLogout} showChat={showChat} setShowChat={setShowChat}/>
      {showChat&&<AIChat onClose={()=>setShowChat(false)} customer={customer}/>}
    </>;
  }

  return <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
    <SiteNav page={webPage} setPage={setWebPage} onStaffLogin={()=>setShowSL(true)} onPortalLogin={()=>setShowCL(true)} showChat={showChat} setShowChat={setShowChat}/>
    {webPage==="Home"      &&<HomePage      setPage={setWebPage} onStaffLogin={()=>setShowSL(true)} onPortalLogin={()=>setShowCL(true)}/>}
    {webPage==="Leistungen"&&<LeistungenPage onPortalLogin={()=>setShowCL(true)}/>}
    {webPage==="SLA"       &&<SLAPage       onPortalLogin={()=>setShowCL(true)}/>}
    {webPage==="Team"      &&<TeamPage/>}
    {webPage==="Stellen"   &&<StellenPage/>}
    {webPage==="Kontakt"   &&<KontaktPage   onPortalLogin={()=>setShowCL(true)}/>}
    {showSL&&<StaffLogin  onClose={()=>setShowSL(false)} onLogin={doSL}/>}
    {showCL&&<CustomerLogin onClose={()=>setShowCL(false)} onLogin={doCL}/>}
    {showChat&&<AIChat onClose={()=>setShowChat(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>

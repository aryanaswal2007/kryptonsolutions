<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Krypton Solutions – ICT Helpdesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F8F4EC;color:#1A0E00}
select,input,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#F0EAD8}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:3px}
.container{max-width:1160px;margin:0 auto;padding:0 40px}
.section-label{font-size:11px;font-weight:700;color:#B8860B;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.section-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:#1A0E00;line-height:1.15;letter-spacing:-.5px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
.fade-up{animation:fadeUp .4s ease forwards}
nav.site-nav{background:rgba(255,253,247,.96);backdrop-filter:blur(14px);border-bottom:1px solid #E8D8A8;position:sticky;top:0;z-index:100;height:68px}
.nav-inner{display:flex;align-items:center;height:100%;padding:0 40px}
.nav-logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#B8860B,#8A6400);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(184,134,11,.3)}
.nav-link{padding:7px 14px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:500;color:#7A5A30;cursor:pointer;transition:all .15s}
.nav-link:hover{background:#FDF3D0;color:#B8860B}
.nav-link.active{background:#FDF3D0;color:#B8860B;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .18s}
.btn-gold{background:linear-gradient(135deg,#D4A017,#B8860B);color:#fff;box-shadow:0 4px 16px rgba(184,134,11,.25)}
.btn-gold:hover{box-shadow:0 6px 22px rgba(184,134,11,.4);transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid #B8860B;color:#B8860B}
.btn-outline:hover{background:#FDF3D0}
.btn-sm{padding:7px 16px;font-size:12px;border-radius:7px}
.btn-ghost{background:transparent;color:#7A5A30;border:1.5px solid #E8D8A8;font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{background:#FDF3D0;border-color:#C9A84C}
.service-card{background:#FFFDF7;border:1px solid #E8D8A8;border-radius:16px;padding:28px;transition:all .2s;cursor:default}
.service-card:hover{box-shadow:0 10px 40px rgba(184,134,11,.1);border-color:#C9A84C;transform:translateY(-3px)}
.service-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#FDF3D0,#FAEDB8);border:1px solid #E8C96A;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.team-card{background:#FFFDF7;border:1px solid #E8D8A8;border-radius:16px;padding:28px 20px;text-align:center;transition:all .2s}
.team-card:hover{box-shadow:0 8px 32px rgba(184,134,11,.12);transform:translateY(-2px)}
.team-avatar{width:70px;height:70px;border-radius:16px;background:linear-gradient(135deg,#FDF3D0,#E8C96A);border:2px solid #C9A84C;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;font-weight:800;color:#B8860B}
.hero{background:linear-gradient(135deg,#1A0E00 0%,#3E2210 45%,#5C3820 100%);position:relative;overflow:hidden;padding:120px 0 100px}
.hero-circle{position:absolute;border-radius:50%;opacity:.1}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:#B09060;letter-spacing:.07em;text-transform:uppercase;background:#FFF9EE;border-bottom:1px solid #E8D8A8}
.data-table td{padding:11px 12px;border-bottom:1px solid #F0E8D0;font-size:12px;color:#1A0E00;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#FFF9EE;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(26,14,0,.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.form-input{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #E8D8A8;font-size:13px;color:#1A0E00;background:#FFFDF7;outline:none;transition:border-color .15s;box-sizing:border-box}
.form-input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(184,134,11,.1)}
.form-label{font-size:10px;font-weight:700;color:#B09060;display:block;margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.form-select{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid #E8D8A8;font-size:13px;color:#1A0E00;background:#FFFDF7;outline:none;cursor:pointer;box-sizing:border-box}
.form-select:focus{border-color:#C9A84C}
.hd-bar{background:linear-gradient(90deg,#1A0E00,#2E1A06);border-bottom:1px solid rgba(255,255,255,.07);height:52px;display:flex;align-items:center;padding:0 20px;gap:4px;flex-shrink:0}
.hd-nav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:rgba(255,255,255,.4)}
.hd-nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}
.hd-nav-btn.active{background:rgba(184,134,11,.2);color:#D4A017;font-weight:700}
.portal-nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;margin:2px 8px;font-size:13px;font-weight:500;color:#7A5A30;cursor:pointer;border:none;background:transparent;transition:all .15s;text-align:left;width:calc(100% - 16px)}
.portal-nav-item:hover{background:#FDF3D0;color:#B8860B}
.portal-nav-item.active{background:#FDF3D0;color:#B8860B;font-weight:700}
.ai-bubble{padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.65;max-width:83%;animation:fadeUp .3s ease}
.ai-bubble.bot{background:#FFFDF7;border:1px solid #E8D8A8;color:#1A0E00;border-radius:14px 14px 14px 4px;align-self:flex-start}
.ai-bubble.user{background:linear-gradient(135deg,#D4A017,#B8860B);color:#fff;border-radius:14px 14px 4px 14px;align-self:flex-end}
.ai-typing{display:flex;gap:5px;padding:12px 16px;background:#FFFDF7;border:1px solid #E8D8A8;border-radius:14px 14px 14px 4px;width:fit-content;align-self:flex-start}
.ai-typing span{width:7px;height:7px;background:#C9A84C;border-radius:50%;animation:shimmer 1.1s ease infinite}
.ai-typing span:nth-child(2){animation-delay:.22s}
.ai-typing span:nth-child(3){animation-delay:.44s}
.site-footer{background:#1A0E00;padding:60px 0 32px}
.sla-card{border-radius:16px;overflow:hidden}
</style>
